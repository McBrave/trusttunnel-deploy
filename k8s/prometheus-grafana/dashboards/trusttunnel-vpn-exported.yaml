apiVersion: v1
items:
- apiVersion: v1
  data:
    trusttunnel-overview.json: |
      {
        "__inputs": [],
        "__requires": [
          { "type": "grafana",    "id": "grafana",    "name": "Grafana",    "version": "9.0.0" },
          { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" },
          { "type": "panel",      "id": "timeseries", "name": "Time series","version": "" },
          { "type": "panel",      "id": "stat",       "name": "Stat",       "version": "" },
          { "type": "panel",      "id": "gauge",      "name": "Gauge",      "version": "" }
        ],
        "annotations": {
          "list": [
            {
              "builtIn": 1,
              "datasource": { "type": "grafana", "uid": "-- Grafana --" },
              "enable": true,
              "hide": true,
              "iconColor": "rgba(0, 211, 255, 1)",
              "name": "Annotations & Alerts",
              "type": "dashboard"
            }
          ]
        },
        "description": "TrustTunnel VPN — live metrics from /metrics (job=trusttunnel-vpn). Auto-provisioned; do not edit in the UI.",
        "editable": false,
        "fiscalYearStartMonth": 0,
        "graphTooltip": 1,
        "id": null,
        "links": [],
        "panels": [
          {
            "collapsed": false,
            "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
            "id": 100,
            "title": "Client Sessions",
            "type": "row"
          },
          {
            "id": 1,
            "title": "Active Sessions — HTTP/1.1",
            "description": "client_sessions{protocol_type=\"HTTP1\"} — concurrent HTTP/1.1 tunnels",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 20   },
                    { "color": "red",    "value": 50   }
                  ]
                },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "client_sessions{job=\"trusttunnel-vpn\", protocol_type=\"HTTP1\"}",
                "legendFormat": "HTTP/1.1",
                "refId": "A"
              }
            ]
          },
          {
            "id": 2,
            "title": "Active Sessions — HTTP/2",
            "description": "client_sessions{protocol_type=\"HTTP2\"} — concurrent HTTP/2 tunnels",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 20   },
                    { "color": "red",    "value": 50   }
                  ]
                },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "client_sessions{job=\"trusttunnel-vpn\", protocol_type=\"HTTP2\"}",
                "legendFormat": "HTTP/2",
                "refId": "A"
              }
            ]
          },
          {
            "id": 3,
            "title": "Total Active Sessions",
            "description": "Sum of all client_sessions across protocol types",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 40   },
                    { "color": "red",    "value": 100  }
                  ]
                },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "sum(client_sessions{job=\"trusttunnel-vpn\"})",
                "legendFormat": "Total",
                "refId": "A"
              }
            ]
          },
          {
            "id": 4,
            "title": "Session History (by Protocol)",
            "description": "Time-series of client_sessions split by protocol_type",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "palette-classic" },
                "custom": {
                  "axisLabel": "Sessions",
                  "lineWidth": 2,
                  "fillOpacity": 15,
                  "gradientMode": "opacity",
                  "spanNulls": false,
                  "showPoints": "never"
                },
                "unit": "short",
                "min": 0
              },
              "overrides": []
            },
            "options": {
              "legend": { "displayMode": "list", "placement": "bottom" },
              "tooltip": { "mode": "multi", "sort": "none" }
            },
            "targets": [
              {
                "expr": "client_sessions{job=\"trusttunnel-vpn\", protocol_type=\"HTTP1\"}",
                "legendFormat": "HTTP/1.1",
                "refId": "A"
              },
              {
                "expr": "client_sessions{job=\"trusttunnel-vpn\", protocol_type=\"HTTP2\"}",
                "legendFormat": "HTTP/2",
                "refId": "B"
              }
            ]
          },
          {
            "id": 5,
            "title": "Outbound TCP Sockets",
            "description": "outbound_tcp_sockets — active outbound TCP connections",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 0, "y": 5 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 100  },
                    { "color": "red",    "value": 500  }
                  ]
                },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "outbound_tcp_sockets{job=\"trusttunnel-vpn\"}",
                "legendFormat": "TCP",
                "refId": "A"
              }
            ]
          },
          {
            "id": 6,
            "title": "Outbound UDP Sockets",
            "description": "outbound_udp_sockets — active outbound UDP sockets",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 4, "y": 5 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 100  },
                    { "color": "red",    "value": 500  }
                  ]
                },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "outbound_udp_sockets{job=\"trusttunnel-vpn\"}",
                "legendFormat": "UDP",
                "refId": "A"
              }
            ]
          },
          {
            "id": 7,
            "title": "Total Outbound Sockets",
            "description": "TCP + UDP sockets combined",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 8, "y": 5 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 200  },
                    { "color": "red",    "value": 1000 }
                  ]
                },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "outbound_tcp_sockets{job=\"trusttunnel-vpn\"} + outbound_udp_sockets{job=\"trusttunnel-vpn\"}",
                "legendFormat": "Total sockets",
                "refId": "A"
              }
            ]
          },
          {
            "collapsed": false,
            "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
            "id": 101,
            "title": "Traffic",
            "type": "row"
          },
          {
            "id": 10,
            "title": "Inbound Throughput",
            "description": "rate(outbound_traffic_bytes) — bytes downloaded by clients per second (Download)",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "palette-classic" },
                "custom": {
                  "axisLabel": "Bytes/s",
                  "lineWidth": 2,
                  "fillOpacity": 20,
                  "gradientMode": "opacity",
                  "spanNulls": false,
                  "showPoints": "never"
                },
                "unit": "Bps",
                "min": 0
              },
              "overrides": []
            },
            "options": {
              "legend": { "displayMode": "list", "placement": "bottom" },
              "tooltip": { "mode": "multi", "sort": "none" }
            },
            "targets": [
              {
                "expr": "rate(outbound_traffic_bytes{job=\"trusttunnel-vpn\"}[$__rate_interval])",
                "legendFormat": "{{protocol_type}} download",
                "refId": "A"
              }
            ]
          },
          {
            "id": 11,
            "title": "Outbound Throughput",
            "description": "rate(inbound_traffic_bytes) — bytes uploaded by clients per second (Upload)",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "palette-classic" },
                "custom": {
                  "axisLabel": "Bytes/s",
                  "lineWidth": 2,
                  "fillOpacity": 20,
                  "gradientMode": "opacity",
                  "spanNulls": false,
                  "showPoints": "never"
                },
                "unit": "Bps",
                "min": 0
              },
              "overrides": []
            },
            "options": {
              "legend": { "displayMode": "list", "placement": "bottom" },
              "tooltip": { "mode": "multi", "sort": "none" }
            },
            "targets": [
              {
                "expr": "rate(inbound_traffic_bytes{job=\"trusttunnel-vpn\"}[$__rate_interval])",
                "legendFormat": "{{protocol_type}} upload",
                "refId": "A"
              }
            ]
          },
          {
            "id": 12,
            "title": "Total Bytes In (cumulative)",
            "type": "stat",
            "gridPos": { "h": 3, "w": 6, "x": 0, "y": 18 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "fixed", "fixedColor": "blue" },
                "unit": "bytes",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "value",
              "graphMode": "none",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "sum(outbound_traffic_bytes{job=\"trusttunnel-vpn\"})",
                "legendFormat": "Total download",
                "refId": "A"
              }
            ]
          },
          {
            "id": 13,
            "title": "Total Bytes Out (cumulative)",
            "type": "stat",
            "gridPos": { "h": 3, "w": 6, "x": 6, "y": 18 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "fixed", "fixedColor": "purple" },
                "unit": "bytes",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "value",
              "graphMode": "none",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "sum(inbound_traffic_bytes{job=\"trusttunnel-vpn\"})",
                "legendFormat": "Total upload",
                "refId": "A"
              }
            ]
          },
          {
            "id": 14,
            "title": "Inbound Share of Total Traffic",
            "type": "stat",
            "gridPos": { "h": 3, "w": 6, "x": 12, "y": 18 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "fixed", "fixedColor": "orange" },
                "unit": "percentunit",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "value",
              "graphMode": "none",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "sum(outbound_traffic_bytes{job=\"trusttunnel-vpn\"}) / (sum(inbound_traffic_bytes{job=\"trusttunnel-vpn\"}) + sum(outbound_traffic_bytes{job=\"trusttunnel-vpn\"}))",
                "legendFormat": "Inbound %",
                "refId": "A"
              }
            ]
          },
          {
            "collapsed": false,
            "gridPos": { "h": 1, "w": 24, "x": 0, "y": 21 },
            "id": 102,
            "title": "Process Health",
            "type": "row"
          },
          {
            "id": 20,
            "title": "CPU Usage",
            "description": "rate(process_cpu_seconds_total) — fraction of one CPU core consumed",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 8, "x": 0, "y": 22 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "fixed", "fixedColor": "orange" },
                "custom": {
                  "axisLabel": "CPU cores",
                  "lineWidth": 2,
                  "fillOpacity": 20,
                  "gradientMode": "opacity",
                  "spanNulls": false,
                  "showPoints": "never"
                },
                "unit": "percentunit",
                "min": 0,
                "max": 1
              },
              "overrides": []
            },
            "options": {
              "legend": { "displayMode": "list", "placement": "bottom" },
              "tooltip": { "mode": "single", "sort": "none" }
            },
            "targets": [
              {
                "expr": "rate(process_cpu_seconds_total{job=\"trusttunnel-vpn\"}[$__rate_interval])",
                "legendFormat": "CPU",
                "refId": "A"
              }
            ]
          },
          {
            "id": 21,
            "title": "Memory — RSS vs Virtual",
            "description": "Resident (RSS) vs virtual memory over time",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 8, "x": 8, "y": 22 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "palette-classic" },
                "custom": {
                  "axisLabel": "Bytes",
                  "lineWidth": 2,
                  "fillOpacity": 15,
                  "gradientMode": "opacity",
                  "spanNulls": false,
                  "showPoints": "never"
                },
                "unit": "bytes",
                "min": 0
              },
              "overrides": []
            },
            "options": {
              "legend": { "displayMode": "list", "placement": "bottom" },
              "tooltip": { "mode": "multi", "sort": "none" }
            },
            "targets": [
              {
                "expr": "process_resident_memory_bytes{job=\"trusttunnel-vpn\"}",
                "legendFormat": "RSS (resident)",
                "refId": "A"
              },
              {
                "expr": "process_virtual_memory_bytes{job=\"trusttunnel-vpn\"}",
                "legendFormat": "Virtual",
                "refId": "B"
              }
            ]
          },
          {
            "id": 22,
            "title": "FD Utilisation",
            "description": "open_fds / max_fds — gauge turns red above 85%",
            "type": "gauge",
            "gridPos": { "h": 8, "w": 8, "x": 16, "y": 22 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "percentage",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 60   },
                    { "color": "red",    "value": 85   }
                  ]
                },
                "unit": "percentunit",
                "min": 0,
                "max": 1,
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "showThresholdLabels": false,
              "showThresholdMarkers": true
            },
            "targets": [
              {
                "expr": "process_open_fds{job=\"trusttunnel-vpn\"} / process_max_fds{job=\"trusttunnel-vpn\"}",
                "legendFormat": "FD utilisation",
                "refId": "A"
              }
            ]
          },
          {
            "collapsed": false,
            "gridPos": { "h": 1, "w": 24, "x": 0, "y": 30 },
            "id": 103,
            "title": "Runtime Vitals",
            "type": "row"
          },
          {
            "id": 30,
            "title": "Resident Memory (now)",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 0, "y": 31 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null       },
                    { "color": "yellow", "value": 314572800  },
                    { "color": "red",    "value": 629145600  }
                  ]
                },
                "unit": "bytes",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "process_resident_memory_bytes{job=\"trusttunnel-vpn\"}",
                "legendFormat": "RSS",
                "refId": "A"
              }
            ]
          },
          {
            "id": 31,
            "title": "OS Threads",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 4, "y": 31 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 50   },
                    { "color": "red",    "value": 200  }
                  ]
                },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "process_threads{job=\"trusttunnel-vpn\"}",
                "legendFormat": "Threads",
                "refId": "A"
              }
            ]
          },
          {
            "id": 32,
            "title": "Open FDs",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 8, "y": 31 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 1000 },
                    { "color": "red",    "value": 5000 }
                  ]
                },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "background",
              "graphMode": "area",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "process_open_fds{job=\"trusttunnel-vpn\"}",
                "legendFormat": "Open FDs",
                "refId": "A"
              }
            ]
          },
          {
            "id": 33,
            "title": "Max FDs (OS limit)",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 12, "y": 31 },
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "fixed", "fixedColor": "text" },
                "unit": "short",
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
              "orientation": "auto",
              "textMode": "auto",
              "colorMode": "value",
              "graphMode": "none",
              "justifyMode": "auto"
            },
            "targets": [
              {
                "expr": "process_max_fds{job=\"trusttunnel-vpn\"}",
                "legendFormat": "Max FDs",
                "refId": "A"
              }
            ]
          },
          {
            "id": 34,
            "title": "Process Uptime",
            "description": "Seconds elapsed since process_start_time_seconds",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 16, "y": 31 },
