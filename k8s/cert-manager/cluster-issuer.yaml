# ClusterIssuer: Let's Encrypt production certificates via Cloudflare DNS-01.
#
# PREREQUISITE: the Cloudflare API token must exist as a Kubernetes Secret
# BEFORE applying this manifest. Create it imperatively — NEVER commit
# the token in plaintext:
#
#   kubectl create secret generic cloudflare-api-token \
#     --namespace cert-manager \
#     --from-literal=api-token="$(ansible-vault view ../ansible/vpn_secrets.yml | grep cloudflare_api_token | awk '{print $2}')"
#
# The existing Cloudflare token (Zone:DNS:Edit + Zone:Zone:Read) already has
# the permissions cert-manager needs for DNS-01 challenges — no new token required.
#
# Install cert-manager first:
#   helm repo add jetstack https://charts.jetstack.io
#   helm repo update
#   helm install cert-manager jetstack/cert-manager \
#     -n cert-manager --create-namespace \
#     --set installCRDs=true

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Replace with your real email for expiry notifications
    email: example1111@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
