# TrustTunnel CI/CD Pipeline
# Phase 3: Terraform plan/apply + Ansible configuration via GitHub Actions.
#
# Triggers:
#   - Pull requests to main: terraform plan only (commented on PR)
#   - Push to main (merge): terraform apply, then ansible provisioning
#
# Authentication: GitHub OIDC -> AWS (no long-lived keys)

name: Deploy TrustTunnel

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write  # Required to comment plan on PRs

env:
  AWS_REGION: eu-north-1
  TF_WORKING_DIR: terraform/environments/dev

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Job 1: Terraform
  # ─────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    outputs:
      vpn_public_ip: ${{ steps.tf-output.outputs.vpn_public_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false  # Needed for clean output capture

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -no-color -input=false \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="ssh_allowed_cidr=${{ secrets.SSH_ALLOWED_CIDR }}" \
            -out=tfplan 2>&1 | tee plan_output.txt
          # Store plan output for PR comment (truncate if too long)
          PLAN=$(head -c 60000 plan_output.txt)
          echo "plan<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Comment plan on PR (only on pull_request events)
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan }}`;
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `### Terraform Plan Output
            \`\`\`
            ${truncated}
            \`\`\`
            *Pushed by @${context.actor} — commit \`${context.sha.substring(0, 7)}\`*`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      # Apply only on push to main (merged PR)
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="ssh_allowed_cidr=${{ secrets.SSH_ALLOWED_CIDR }}"

      # Capture outputs for the Ansible job
      - name: Export Terraform Outputs
        id: tf-output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "vpn_public_ip=$(terraform output -raw vpn_public_ip)" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: Ansible (runs only on push to main, after Terraform succeeds)
  # ─────────────────────────────────────────────────────────────────────
  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VPN_IP: ${{ needs.terraform.outputs.vpn_public_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Dynamic SSH access for GitHub Actions runner ──────────────────
      - name: Look up security group ID
        id: sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=trusttunnel-sg" \
            --query "SecurityGroups[0].GroupId" --output text)
          echo "id=${SG_ID}" >> $GITHUB_OUTPUT
          echo "Security Group: ${SG_ID}"

      - name: Get runner public IP
        id: runner-ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          echo "Runner IP: ${RUNNER_IP}"

      - name: Authorize runner SSH in security group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ steps.sg.outputs.id }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.ip }}/32" \
            --tag-specifications 'ResourceType=security-group-rule,Tags=[{Key=Name,Value=github-actions-temp}]'
          echo "Authorized SSH from ${{ steps.runner-ip.outputs.ip }}/32"

      # ── Ansible setup ────────────────────────────────────────────────
      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible
          ansible-galaxy collection install community.general

      - name: Generate inventory from Terraform output
        run: |
          cat > ansible/inventory/hosts.ini << EOF
          [vpn]
          trusttunnel ansible_host=${VPN_IP}

          [vpn:vars]
          ansible_user=ubuntu
          EOF
          echo "Inventory:"
          cat ansible/inventory/hosts.ini

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deployer_key
          chmod 600 ~/.ssh/deployer_key

      - name: Write vault password file
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > ansible/vault_pass.txt
          chmod 600 ansible/vault_pass.txt

      - name: Run Ansible playbook
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook playbooks/site.yml \
            --private-key ~/.ssh/deployer_key \
            --vault-password-file vault_pass.txt \
            -i inventory/hosts.ini

      # ── Cleanup: always revoke the temporary SSH rule ────────────────
      - name: Revoke runner SSH from security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ steps.sg.outputs.id }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.ip }}/32" \
          && echo "Revoked SSH from ${{ steps.runner-ip.outputs.ip }}/32" \
          || echo "Warning: could not revoke rule (may already be removed)"

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ~/.ssh/deployer_key
          rm -f ansible/vault_pass.txt
