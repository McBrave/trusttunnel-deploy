---
# Fetch the k3s-generated kubeconfig back to the control machine and rewrite
# the server address from 127.0.0.1 to the node's real public IP.
#
# This is a well-known k3s gotcha: k3s writes its kubeconfig with
# server: https://127.0.0.1:6443, which only works ON the node itself.
# Remote kubectl needs the actual reachable address.

- name: Read kubeconfig from k3s node
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: k3s_kubeconfig_raw

- name: Save kubeconfig locally
  ansible.builtin.copy:
    content: "{{ k3s_kubeconfig_raw.content | b64decode | regex_replace('https://127\\.0\\.0\\.1:6443', 'https://' + ansible_host + ':6443') }}"
    dest: "{{ k3s_kubeconfig_local_path }}"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Confirm kubeconfig was written
  ansible.builtin.debug:
    msg: "kubeconfig saved to {{ k3s_kubeconfig_local_path }} (server rewritten to {{ ansible_host }}:6443)"
