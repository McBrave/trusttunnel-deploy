---
# Creates or updates the DNS A record for the Grafana subdomain in Cloudflare.
# Same check-before-create idempotency pattern as roles/trusttunnel/tasks/dns.yml.

- name: Check if Grafana DNS A record already exists in Cloudflare
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ grafana_domain }}&type=A"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
  register: grafana_cf_lookup

- name: Create Grafana DNS A record via Cloudflare API
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: "A"
      name: "{{ grafana_domain }}"
      content: "{{ ansible_host }}"
      ttl: 1
      proxied: false
    status_code: [200, 201]
  when: grafana_cf_lookup.json.result | length == 0

- name: Update Grafana DNS A record if the IP has changed
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ grafana_cf_lookup.json.result[0].id }}"
    method: PATCH
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      content: "{{ ansible_host }}"
    status_code: [200]
  when:
    - grafana_cf_lookup.json.result | length > 0
    - grafana_cf_lookup.json.result[0].content != ansible_host
