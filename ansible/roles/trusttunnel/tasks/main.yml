---
# Task orchestrator for the trusttunnel role.
# Files run in order — each step must succeed before the next starts.
#
# Order matters:
#   1. prerequisites  — OS packages, directories
#   2. install        — TrustTunnel binary (needs dir from step 1)
#   3. certbot        — TLS certificate (needs port 80 open; runs before config)
#   4. configure      — Render TOML configs (needs cert paths from step 3)
#   5. service        — Systemd enable + start (needs config from step 4)

- import_tasks: prerequisites.yml
  tags: [prerequisites]

- import_tasks: install.yml
  tags: [install]

- import_tasks: dns.yml
  tags: [dns]

- import_tasks: certbot.yml
  tags: [certbot, tls]

- import_tasks: configure.yml
  tags: [configure]

- import_tasks: service.yml
  tags: [service]