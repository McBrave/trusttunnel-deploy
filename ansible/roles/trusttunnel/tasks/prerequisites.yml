---
# Establishes base directory structures and host-level firewall rules.

- name: Ensure TrustTunnel installation directory exists
  ansible.builtin.file:
    path: "{{ trusttunnel_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install base dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - curl
    state: present
    update_cache: true
    