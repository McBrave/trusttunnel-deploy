# Ansible configuration for the TrustTunnel deployment.
# Run ansible/ansible-playbook commands from inside this `ansible/` directory
# so this file is picked up automatically.

[defaults]
inventory            = inventory/hosts.ini
roles_path           = roles
remote_user          = ubuntu
# Private key that matches the public key you gave Terraform (ssh_public_key).
# Change this to your actual key path.
private_key_file     = /mnt/d/ssh-tt/trusttunnel-key
interpreter_python   = auto_silent
vault_password_file  = vault_pass.txt

# Fresh cloud servers have an unknown host key on first connect. Disabling the
# check avoids a prompt on every new instance. Trade-off: it skips host-key
# verification — fine for short-lived lab infra, but in a long-lived/production
# setup you'd manage known_hosts instead. Documented as a deliberate choice.
host_key_checking    = False

[privilege_escalation]
become         = True
become_method  = sudo
become_user    = root
